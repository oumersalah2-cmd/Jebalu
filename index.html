<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahmedin Jebal - Story</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="light-mode">
    <div id="dynamic-bg"></div>
    <nav class="navbar">
      <div class="brand"></div>
      <div class="controls">
        <select id="language-select">
          <option value="amharic">Amharic (አማርኛ)</option>
          <option value="oromic">Afaan Oromoo</option>
        </select>
        <button id="theme-toggle" aria-label="Toggle Dark Mode">
          <!-- SVG Moon/Sun -->
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-sun" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
      </div>
    </nav>

    <main class="reader-container">
      <div id="content-container">
        <!-- JS will inject content here depending on page and language -->
      </div>
      
      <div class="pagination-controls">
        <button id="prev-btn" class="nav-btn" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-left"><polyline points="15 18 9 12 15 6"></polyline></svg> Previous
        </button>
        <span id="page-indicator">Page ...</span>
        <button id="next-btn" class="nav-btn">
          Next <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-right"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>

      <footer class="app-footer">
        <div class="disclaimer-text" style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 20px; text-align: center;">
          <p style="margin-bottom: 8px;">ይህ ፅሁፍ ከአህመዲን ጀበል የፌስቡክ ገፅ ላይ ምንም ሳይጨመርበት፣ ሳይቀነስበት እና ሳይስተካከል የተወሰደ ነው።</p>
          <p>Barreeffamni kun fuula Facebook Ahmedin Jebal irraa homaa osoo itti hin dabalin, irraa hin hir'isin fi hin sirreessin kan fudhatamedha.</p>
        </div>
        <p>Developed by: <strong>Abdusalam Oumer</strong></p>
        <p>For comment, Telegram account: <a href="https://t.me/Afewsvs" target="_blank">@Afewsvs</a></p>
      </footer>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
